tool = "docker-compose"
enabled = true
aliases = ["docker-compose", "compose"]
warning_patterns = ["warn[", "warning:", "warn:"]
error_patterns = [
  "error:",
  "exited with code",
  "pull access denied",
  "failed",
  "cannot find",
]
error_capture_patterns = ["error:", "exited with code", "pull access denied", "failed"]
detection_regex = [
  '^Container\s+\S+\s+(Started|Stopped|Created|Running|Error|Exited)',
  '^Attaching to\s+',
  '^\S+\s+\|\s+',
  '^\[\+\]\s+Running\s+[0-9]+/[0-9]+',
]
